<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Job Agent — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#faf6ee; --panel:#fffdf8; --panel2:#f3eee3; --border:#ebe5d8;
    --text:#272a26; --text2:#4a4d47; --muted:#918d82; --heading:#454b43;
    --accent:#5c8169; --accent-hover:#4e7059; --accent-soft:rgba(92,129,105,.45);
    --chip:#f1ebde; --chip-hover:#e8e1d2; --warn:#9a9a92; --mid:#c9a24a;
    --grad-from:#faf6ee; --grad-to:#f1e9d9;
    /* Single neutral typeface (Swiss-style); "data" styling comes from spacing,
       case and tabular figures rather than a contrasting font. */
    --data:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --shadow:rgba(60,80,65,.10); color-scheme:light;
  }
  /* Dark theme: explicit opt-in, or system preference unless light is forced. */
  :root[data-theme="dark"] {
    --bg:#15171a; --panel:#1c2024; --panel2:#23272c; --border:#2d3239;
    --text:#e8e5dd; --text2:#b9b6ac; --muted:#8b897f; --heading:#cdcabf;
    --accent:#7faa8d; --accent-hover:#92bb9f; --accent-soft:rgba(127,170,141,.4);
    --chip:#262b30; --chip-hover:#2f353b; --warn:#9a9a92; --mid:#c9a24a;
    --grad-from:#15171a; --grad-to:#191c20;
    --shadow:rgba(0,0,0,.4); color-scheme:dark;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:#15171a; --panel:#1c2024; --panel2:#23272c; --border:#2d3239;
      --text:#e8e5dd; --text2:#b9b6ac; --muted:#8b897f; --heading:#cdcabf;
      --accent:#7faa8d; --accent-hover:#92bb9f; --accent-soft:rgba(127,170,141,.4);
      --chip:#262b30; --chip-hover:#2f353b; --warn:#9a9a92; --mid:#c9a24a;
      --grad-from:#15171a; --grad-to:#191c20;
      --shadow:rgba(0,0,0,.4); color-scheme:dark;
    }
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0;
         font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
         text-rendering:optimizeLegibility; letter-spacing:-0.01em; }
  a { color:inherit; text-decoration:none; }
  .hidden { display:none !important; }

  /* ===== Motion ===== */
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes popIn { from { opacity:0; transform:translateY(8px) scale(.97); } to { opacity:1; transform:none; } }
  @keyframes slideIn { from { transform:translateX(100%); } to { transform:none; } }
  @keyframes pulse { 0% { box-shadow:0 0 0 0 var(--accent-soft); }
                     70% { box-shadow:0 0 0 7px transparent; }
                     100% { box-shadow:0 0 0 0 transparent; } }
  @keyframes spin { to { transform:rotate(360deg); } }
  .icon-btn.loading { pointer-events:none; opacity:.7; }
  .icon-btn.loading svg { animation:spin .7s linear infinite; }
  body { transition:background-color .3s ease, color .3s ease; }
  /* Animatable custom property so the score ring can sweep 0 -> value. */
  @property --p { syntax:"<number>"; inherits:false; initial-value:0; }
  /* Scroll-reveal: cards start hidden, then animate in when observed. */
  @keyframes cardIn { from { opacity:0; transform:translateY(12px); }
                      to   { opacity:1; transform:none; } }
  .reveal { opacity:0; }
  .reveal.in-view { animation:cardIn .5s cubic-bezier(.16,.8,.3,1) both;
                    animation-delay:var(--d, 0s); }
  @media (prefers-reduced-motion: no-preference) { html { scroll-behavior:smooth; } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation:none !important; transition:none !important; }
    .reveal { opacity:1 !important; }
  }

  /* ===== Lock screen ===== */
  #lock { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .lockbox { width:100%; max-width:340px; text-align:center; }
  .lockbox h1 { font-size:22px; font-weight:700; margin:0 0 6px; letter-spacing:-0.03em; }
  .lockbox p { color:var(--muted); font-size:14px; margin:0 0 24px; font-weight:400; }
  input[type=password], input[type=search], select {
    width:100%; padding:12px 14px; background:var(--bg); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-size:14px; font-family:inherit;
    font-weight:400; outline:none; transition:border-color .15s ease; }
  input:focus, select:focus { border-color:var(--accent); }
  button { cursor:pointer; border:none; border-radius:12px; font-size:14px; font-weight:600;
           padding:12px 18px; background:var(--accent); color:#fff; font-family:inherit;
           letter-spacing:-0.01em; transition:opacity .15s ease; }
  button:hover { opacity:.85; }
  button.secondary { background:var(--chip); color:var(--text); font-weight:500; }
  #unlock-btn { margin-top:12px; width:100%; }
  #lock-err { color:#d23; font-size:13px; margin-top:14px; min-height:18px; font-weight:400; }

  /* ===== Scroll progress + back-to-top ===== */
  #scroll-progress { position:fixed; top:0; left:0; height:3px; width:0;
                     background:linear-gradient(90deg, var(--accent), var(--accent-hover));
                     z-index:60; transition:width .12s linear; }
  .to-top { position:fixed; right:26px; bottom:26px; width:44px; height:44px; padding:0;
            border-radius:50%; background:var(--accent); color:#fff; z-index:55;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 8px 24px var(--shadow); opacity:0; transform:translateY(12px) scale(.9);
            pointer-events:none; transition:opacity .25s ease, transform .25s ease; }
  .to-top.show { opacity:1; transform:none; pointer-events:auto; }
  .to-top:hover { transform:translateY(-2px); opacity:.92; }

  /* ===== Split layout ===== */
  .split { display:flex; min-height:100vh; }
  .left { flex:1 1 42%; display:flex; flex-direction:column; justify-content:center;
          padding:64px; position:sticky; top:0; height:100vh;
          background:linear-gradient(165deg, var(--grad-from), var(--grad-to));
          animation:fadeUp .7s cubic-bezier(.2,.7,.2,1) both; }
  .left .kicker { font-family:var(--data); font-size:11px; font-weight:500; letter-spacing:.18em;
                  text-transform:uppercase; color:var(--muted); margin-bottom:22px;
                  display:flex; align-items:center; gap:10px; }
  .left .kicker::after { content:""; flex:1; height:1px; background:var(--border); max-width:120px; }
  .left h1 { font-size:clamp(38px, 5.4vw, 76px); font-weight:400; line-height:1.05;
             margin:0; letter-spacing:-0.035em; color:var(--heading); }
  .left h1 .name { font-weight:600; color:var(--text); }
  .left .sub { color:var(--muted); font-size:15px; margin-top:20px; font-weight:400;
               max-width:340px; line-height:1.55; }
  /* ===== Weather ===== */
  .weather { display:flex; gap:12px; margin-top:22px; flex-wrap:wrap;
             max-width:380px; animation:fadeUp .5s ease both; }
  .wx-card { flex:1 1 150px; min-width:140px; background:var(--chip); border:1px solid var(--border);
             border-radius:16px; padding:14px 16px; }
  .wx-city { font-family:var(--data); font-size:10px; font-weight:500; color:var(--muted);
             text-transform:uppercase; letter-spacing:.12em; margin-bottom:9px; }
  .wx-main { display:flex; align-items:baseline; gap:9px; }
  .wx-icon { font-size:24px; line-height:1; }
  .wx-temp { font-family:var(--data); font-size:26px; font-weight:500; letter-spacing:-0.02em;
             color:var(--text); font-variant-numeric:tabular-nums; }
  .wx-cond { font-size:12.5px; font-weight:500; color:var(--text2); margin-top:5px; }
  .wx-stats { display:flex; flex-direction:column; gap:3px; margin-top:11px; font-family:var(--data);
              font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .stats { display:flex; gap:8px; margin-top:26px; flex-wrap:wrap; }
  .stat { display:inline-flex; align-items:center; gap:7px; background:transparent;
          border:1px solid var(--border); border-radius:6px; padding:6px 11px;
          font-family:var(--data); font-size:11px; font-weight:400; letter-spacing:.02em;
          text-transform:uppercase; color:var(--muted); }
  .stat b { font-weight:600; color:var(--text); font-variant-numeric:tabular-nums; }
  .stat .pulse { width:6px; height:6px; border-radius:50%; background:var(--accent);
                 animation:pulse 2.2s infinite; }
  .left .updated { font-family:var(--data); color:var(--muted); font-size:11px; margin-top:auto;
                   padding-top:32px; font-weight:400; letter-spacing:.02em; }

  .right { flex:1 1 58%; border-left:1px solid var(--border); padding:40px 44px 80px;
           min-width:0; }
  .right-head { display:flex; align-items:center; gap:12px; margin-bottom:26px;
                padding-bottom:18px; border-bottom:1px solid var(--border); }
  .right-head .label { font-family:var(--data); font-size:12px; font-weight:600;
                       letter-spacing:.14em; text-transform:uppercase; color:var(--text); }
  .right-head .count { font-family:var(--data); font-size:12px; color:var(--muted);
                       letter-spacing:.04em; font-variant-numeric:tabular-nums; }
  .right-head .grow { flex:1; }
  .filter-btn { display:inline-flex; align-items:center; gap:7px; padding:9px 14px;
                background:var(--chip); color:var(--text); border-radius:999px;
                font-size:13px; font-weight:500; position:relative;
                transition:background .15s ease, transform .15s ease; }
  .filter-btn:hover { background:var(--chip-hover); transform:translateY(-1px); }
  .filter-btn .dot { width:6px; height:6px; border-radius:50%; background:var(--accent);
                     display:none; }
  .filter-btn.active .dot { display:block; }
  .icon-btn { display:inline-flex; align-items:center; justify-content:center; width:38px;
              height:38px; padding:0; border-radius:999px; background:var(--chip);
              color:var(--text); transition:background .15s ease, transform .15s ease; }
  .icon-btn:hover { background:var(--chip-hover); transform:translateY(-1px); opacity:1; }
  .icon-btn .moon { display:none; }
  :root[data-theme="dark"] .icon-btn .moon { display:block; }
  :root[data-theme="dark"] .icon-btn .sun { display:none; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .icon-btn .moon { display:block; }
    :root:not([data-theme="light"]) .icon-btn .sun { display:none; }
  }

  /* ===== Tabs (Openings / Saved) ===== */
  .tabs { display:flex; gap:4px; }
  .tab { background:transparent; color:var(--muted); font-family:var(--data); font-size:12px;
         font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:7px 13px;
         border-radius:999px; display:inline-flex; align-items:center; gap:8px;
         transition:background .15s ease, color .15s ease; }
  .tab:hover { background:var(--chip); color:var(--text2); opacity:1; }
  .tab.active { background:var(--chip); color:var(--text); }
  .tab-count { font-family:var(--data); font-size:10.5px; font-weight:600; color:var(--muted);
               font-variant-numeric:tabular-nums; background:var(--panel2); border-radius:999px;
               padding:1px 7px; min-width:18px; text-align:center; }
  .tab.active .tab-count { color:var(--text); }

  /* ===== Job grid ===== */
  /* Flush hairline grid: the 1px gaps over a border-coloured background read as
     ruled gutters. auto-fit collapses empty tracks so partial rows stay clean. */
  .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(264px, 1fr));
          gap:1px; background:var(--border); border:1px solid var(--border); }
  .empty { grid-column:1/-1; display:flex; flex-direction:column; align-items:center;
           text-align:center; padding:72px 20px; color:var(--muted); background:var(--panel);
           animation:fadeUp .4s ease both; }
  .empty svg { width:46px; height:46px; stroke:var(--muted); opacity:.6; margin-bottom:16px; }
  .empty p { font-size:14px; margin:0 0 16px; }
  .empty button { padding:9px 16px; font-size:13px; }

  .card { background:var(--panel); border:0; border-radius:0;
          padding:20px; display:flex; flex-direction:column;
          transition:background .18s ease, box-shadow .18s ease; }
  /* Highlight in place (no lift) so the ruled grid stays intact. */
  .card:hover { background:var(--panel2); box-shadow:inset 0 0 0 1.5px var(--accent); }
  .card.applied { opacity:.5; }

  /* ===== Top picks (best of the last 24h, pinned above the grid) ===== */
  .toppicks { margin-bottom:30px; animation:fadeUp .45s ease both; }
  .toppicks-head { display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
  .toppicks-head .t { font-family:var(--data); font-size:11px; font-weight:600; letter-spacing:.14em;
                      text-transform:uppercase; color:var(--text);
                      display:inline-flex; align-items:center; gap:6px; }
  .toppicks-head .s { font-family:var(--data); font-size:11px; color:var(--muted); font-weight:400;
                      letter-spacing:.02em; }
  .grid2 { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:14px; }
  .card.pinned { border:1.5px solid var(--accent);
                 background:linear-gradient(160deg, var(--panel), var(--panel2)); }
  .card.pinned:hover { background:linear-gradient(160deg, var(--panel), var(--panel2));
                       box-shadow:inset 0 0 0 1.5px var(--accent); }
  .pin-badge { flex:0 0 auto; display:inline-flex; align-items:center; gap:4px; font-family:var(--data);
               font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
               color:#fff; background:var(--accent); border-radius:2px; padding:3px 8px; }
  .pin-dismiss { flex:0 0 auto; margin-left:6px; width:21px; height:21px; border-radius:50%;
                 display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
                 background:var(--chip); color:var(--muted); font-size:11px; line-height:1;
                 transition:background .15s ease, color .15s ease; }
  .pin-dismiss:hover { background:var(--chip-hover); color:var(--text); }

  /* Viewed: a subtle accent rail so opportunities you've opened recede a touch. */
  .card.viewed { border-color:var(--border); }
  .card.viewed::before { content:""; position:absolute; left:0; top:14px; bottom:14px;
                         width:3px; border-radius:0 3px 3px 0; background:var(--accent-soft); }
  .card { position:relative; }
  .viewed-badge { flex:0 0 auto; display:inline-flex; align-items:center; gap:4px;
                  font-family:var(--data); font-size:9.5px; font-weight:500; letter-spacing:.04em;
                  text-transform:uppercase; color:var(--muted);
                  background:var(--chip); border-radius:2px; padding:3px 8px;
                  cursor:pointer; transition:background .15s ease; }
  .viewed-badge:hover { background:var(--chip-hover); }
  .card-top { display:flex; align-items:flex-start; gap:8px; margin-bottom:10px; }
  .card-idx { flex:0 0 auto; font-family:var(--data); font-size:10px; font-weight:500;
              color:var(--muted); opacity:.55; letter-spacing:.06em; padding-top:2px;
              font-variant-numeric:tabular-nums; }
  .new-tag { flex:0 0 auto; display:inline-flex; align-items:center; font-family:var(--data);
             font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#fff;
             background:var(--mid); border-radius:2px; padding:3px 7px; white-space:nowrap; }
  /* Circular score ring: conic fill = score/10, with the number in the hole. */
  .score { --ring:var(--accent); flex:0 0 auto; width:46px; height:46px; border-radius:50%;
           position:relative; display:flex; align-items:center; justify-content:center;
           background:conic-gradient(var(--ring) calc(var(--p,0)*1%), var(--panel2) 0);
           transition:transform .2s ease, --p .9s cubic-bezier(.2,.7,.2,1); }
  .score::before { content:""; position:absolute; inset:4px; border-radius:50%;
                   background:var(--panel); transition:background .3s ease; }
  .score span { position:relative; font-family:var(--data); font-weight:500; font-size:12px;
                color:var(--text); font-variant-numeric:tabular-nums; }
  .card:hover .score { transform:scale(1.06) rotate(-3deg); }
  .s-hi { --ring:var(--accent); }
  .s-mid { --ring:var(--mid); }
  .s-lo { --ring:var(--muted); }
  .title { font-size:15px; font-weight:600; margin:0; line-height:1.3; letter-spacing:-0.02em; }
  .company { font-family:var(--data); color:var(--muted); font-size:10.5px; margin-top:5px;
             font-weight:400; letter-spacing:.01em; }
  .summary { font-size:13px; line-height:1.5; margin:0 0 12px; color:var(--text2); font-weight:400; }
  .facts { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .chip { background:var(--chip); border-radius:2px; padding:4px 9px; font-family:var(--data);
          font-size:10px; color:var(--text2); font-weight:400; letter-spacing:.01em; }
  .tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
  .tag { font-family:var(--data); font-size:10px; color:var(--muted); border:1px solid var(--border);
         border-radius:2px; padding:2px 7px; font-weight:400; text-transform:lowercase; }

  /* ===== Score breakdown ===== */
  .bd { margin:0 0 12px; }
  .bd > summary { cursor:pointer; list-style:none; font-family:var(--data); font-size:10.5px;
                  font-weight:400; letter-spacing:.01em; color:var(--muted);
                  display:flex; align-items:center; gap:6px; user-select:none; }
  .bd > summary::-webkit-details-marker { display:none; }
  .bd > summary::before { content:"\25B8"; font-size:9px; transition:transform .15s ease; }
  .bd[open] > summary::before { transform:rotate(90deg); }
  .bd-role { background:var(--chip); border-radius:2px; padding:1px 8px; font-size:10.5px;
             color:var(--text2); font-weight:500; text-transform:capitalize; }
  .bd-cap { color:var(--mid); font-weight:500; font-size:10.5px; }
  .bd-body { margin-top:9px; display:flex; flex-direction:column; gap:6px; }
  .bd-row { display:flex; align-items:center; gap:8px; }
  .bd-label { flex:0 0 64px; font-family:var(--data); font-size:10px; color:var(--muted);
              font-weight:400; letter-spacing:.02em; }
  .bd-track { flex:1; height:5px; background:var(--panel2); border-radius:999px; overflow:hidden; }
  .bd-fill { display:block; height:100%; background:var(--accent); border-radius:999px; }
  .bd-val { flex:0 0 26px; text-align:right; font-family:var(--data); font-size:10.5px;
            font-weight:500; color:var(--text); font-variant-numeric:tabular-nums; }

  .actions { display:flex; gap:8px; align-items:center; margin-top:auto; }
  .actions .spacer { flex:1; }
  .src { color:var(--muted); }
  .linkbtn { padding:9px 14px; background:var(--accent); color:#fff; border-radius:2px;
             font-size:12.5px; font-weight:600; }
  .linkbtn:hover { opacity:.85; }
  .minibtn { font-size:12px; padding:8px 11px; border-radius:2px; }
  /* Compact bookmark toggle: save a job for later (the Saved tab). */
  .iconmini { width:34px; height:34px; padding:0; flex:0 0 auto; border-radius:2px;
              background:var(--chip); color:var(--text2);
              display:inline-flex; align-items:center; justify-content:center;
              transition:background .15s ease, color .15s ease; }
  .iconmini:hover { background:var(--chip-hover); color:var(--text); opacity:1; }
  .iconmini svg { width:15px; height:15px; }
  .save-btn.is-saved { background:var(--accent); color:#fff; }
  .save-btn.is-saved:hover { background:var(--accent-hover); color:#fff; }

  /* ===== Filter drawer (slides in from the right) ===== */
  .overlay { position:fixed; inset:0; background:rgba(20,24,20,.34); z-index:40;
             display:flex; align-items:stretch; justify-content:flex-end;
             backdrop-filter:blur(2px); animation:fadeIn .2s ease both; }
  .drawer { background:var(--panel); border-left:1px solid var(--border);
            width:380px; max-width:88vw; height:100%; padding:30px 28px; overflow-y:auto;
            box-shadow:-24px 0 60px var(--shadow);
            animation:slideIn .28s cubic-bezier(.2,.7,.2,1) both; }
  .drawer h2 { font-size:17px; font-weight:700; margin:0 0 22px; letter-spacing:-0.02em; }
  .field { margin-bottom:18px; }
  .field label { display:block; font-size:12px; font-weight:500; color:var(--muted);
                 margin-bottom:6px; letter-spacing:.01em; }
  .popup-actions { display:flex; gap:10px; margin-top:24px; }
  .popup-actions button { flex:1; }

  @media (max-width: 860px) {
    .split { flex-direction:column; }
    .left { position:static; height:auto; padding:48px 28px 32px; flex:none; }
    .left h1 { font-size:clamp(36px, 12vw, 64px); }
    .left .updated { padding-top:24px; }
    .right { border-left:none; border-top:1px solid var(--border); padding:28px; flex:none; }
  }
</style>
</head>
<body>

<!-- ===== Lock screen ===== -->
<div id="lock">
  <div class="lockbox">
    <h1>Job Agent</h1>
    <p>Enter your dashboard password</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password" />
    <button id="unlock-btn">Unlock</button>
    <div id="lock-err"></div>
  </div>
</div>

<!-- ===== App (hidden until unlocked) ===== -->
<div id="app" class="hidden">
  <div id="scroll-progress"></div>
  <button id="to-top" class="to-top" title="Back to top" aria-label="Back to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"></path></svg>
  </button>

async function decryptPayload(b64, password) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = raw.slice(0,16), iv = raw.slice(16,28), ct = raw.slice(28);
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(password),
    "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:200000, hash:"SHA-256" },
    base, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function loadSet(k){ try { return new Set(JSON.parse(localStorage.getItem(k)||"[]")); } catch { return new Set(); } }
function saveSet(k,s){ localStorage.setItem(k, JSON.stringify([...s])); }
const applied = loadSet(LS.applied), hidden = loadSet(LS.hidden), viewed = loadSet(LS.viewed);
const saved = loadSet(LS.saved);
const topDismissed = loadSet(LS.topDismissed);

// Stable per-role key: prefer the cross-source dedup key so hide/apply/save/view
// state sticks to the logical job even when a different tracker represents it.
// Falls back to the per-source id for older payloads without a dkey.
const keyOf = (j) => j.dkey || j.id;

// One-time migration: older builds keyed this state by a job's per-source id,
// which changed when a different tracker became the representative for the same
// role — so a hidden job could "reappear". Carry any state stored under the id
// of a still-shown job forward onto its stable key.
function migrateKeys(){
  const sets = [[applied, LS.applied], [hidden, LS.hidden], [viewed, LS.viewed],
                [saved, LS.saved], [topDismissed, LS.topDismissed]];
  for (const j of (DATA.jobs || [])) {
    const k = keyOf(j);
    if (!k || k === j.id) continue;
    for (const [s, lsk] of sets) {
      if (s.has(j.id)) { s.delete(j.id); s.add(k); saveSet(lsk, s); }
    }
  }
}

const el = (id) => document.getElementById(id);
function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso); return isNaN(d)?"":d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
// Relative posting age, e.g. "today", "3d ago", "2w ago", "5mo ago".
function fmtAge(iso){
  if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return "";
  const days=Math.floor((Date.now()-d.getTime())/86400000);
  if(days<=0) return "today"; if(days===1) return "1d ago";
  if(days<7) return days+"d ago"; if(days<31) return Math.floor(days/7)+"w ago";
  if(days<365) return Math.floor(days/30)+"mo ago"; return Math.floor(days/365)+"y ago";
}

// Motion preferences: respect the OS "reduce motion" setting throughout.
const MOTION_OK = !matchMedia("(prefers-reduced-motion: reduce)").matches;
const REVEAL_OK = MOTION_OK && ("IntersectionObserver" in window);

// Sweep a card's score ring to its target and play its entrance.
function revealCard(card){
  card.classList.add("in-view");
  const ring = card.querySelector(".score");
  if (ring && ring.dataset.p != null) ring.style.setProperty("--p", ring.dataset.p);
}
const _revealIO = REVEAL_OK ? new IntersectionObserver((entries) => {
  for (const e of entries) {
    if (e.isIntersecting) { revealCard(e.target); _revealIO.unobserve(e.target); }
  }
}, { rootMargin: "0px 0px -8% 0px", threshold: 0.06 }) : null;

// Reveal cards on scroll (or immediately if motion is reduced/unsupported).
function observeCards(container){
  container.querySelectorAll(".card").forEach(c => {
    if (_revealIO) _revealIO.observe(c); else revealCard(c);
  });
}

// Wire the apply/hide/view buttons inside a freshly-rendered card container.
function wireCards(container){
  container.querySelectorAll("[data-act]").forEach(b => b.addEventListener("click", onAction));
  container.querySelectorAll("[data-view-id]").forEach(a => a.addEventListener("click", onView));
  container.querySelectorAll("[data-unview-id]").forEach(b => b.addEventListener("click", onUnview));
  container.querySelectorAll("[data-dismiss-id]").forEach(b => b.addEventListener("click", onDismiss));
  observeCards(container);
}

// Pin the best 2 openings first seen in the last 24h above the grid. Independent
// of the filter drawer; respects hidden/applied so handled roles drop out.
let TOP_IDS = new Set();
const TOP_WINDOW_MS = 24 * 3600 * 1000;
function renderTopPicks(){
  const box = el("toppicks");
  const cutoff = Date.now() - TOP_WINDOW_MS;
  const recent = (DATA.jobs || []).filter(j =>
    !hidden.has(keyOf(j)) && !applied.has(keyOf(j)) && !topDismissed.has(keyOf(j)) &&
    j.first_seen && new Date(j.first_seen).getTime() >= cutoff);
  recent.sort((a, b) => (b.score - a.score) || (b.first_seen||"").localeCompare(a.first_seen||""));
  const picks = recent.slice(0, 2);
  TOP_IDS = new Set(picks.map(j => keyOf(j)));
  if (!picks.length) { box.classList.add("hidden"); box.innerHTML = ""; return; }
  box.classList.remove("hidden");
  box.innerHTML =
    `<div class="toppicks-head"><span class="t">★ Top picks</span>`
    + `<span class="s">Best ${picks.length > 1 ? "2 " : ""}of the last 24 hours</span></div>`
    + `<div class="grid2">${picks.map((j, i) => cardHTML(j, i, true)).join("")}</div>`;
  wireCards(box);
}

function renderJobs(){
  // Top picks only belong on the Openings tab; the Saved tab is its own list.
  if (TAB === "saved") { el("toppicks").classList.add("hidden"); TOP_IDS = new Set(); }
  else renderTopPicks();
  const jobs = DATA.jobs || [];
  const q = el("q").value.toLowerCase().trim();
  const src = el("source").value;
  const stateF = el("state").value;
  const view = el("view").value;
  const sort = el("sort").value;
  const minScore = parseFloat(el("minscore").value);
  const onSaved = TAB === "saved";

  let rows = jobs.filter(j => {
    const k = keyOf(j);
    if (onSaved && !saved.has(k)) return false;
    if (!onSaved) {
      if (TOP_IDS.has(k)) return false;  // shown pinned above; don't repeat
      if (j.score < minScore) return false;
      const isHidden = hidden.has(k), isApplied = applied.has(k);
      if (view === "active" && (isHidden || isApplied)) return false;
      if (view === "applied" && !isApplied) return false;
      if (view === "hidden" && !isHidden) return false;
      if (view === "unviewed" && (viewed.has(k) || isHidden || isApplied)) return false;
      if (view === "viewed" && !viewed.has(k)) return false;
    }
    if (src && j.source !== src) return false;
    if (stateF && j.state !== stateF) return false;
    if (q) {
      const blob = (j.title+" "+j.company+" "+(j.tags||[]).join(" ")+" "+(j.location||"")).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
  rows.sort((a,b) => sort==="score" ? b.score-a.score : (b.first_seen||"").localeCompare(a.first_seen||""));

  const shown = rows.length + TOP_IDS.size;
  el("open-count").textContent = shown + " shown";
  const content = el("content");
  if (!rows.length) {
    const msg = onSaved
      ? "No saved jobs yet — tap the bookmark on a card to save it for later."
      : "No openings match these filters.";
    content.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>
      <p>${msg}</p>
      ${onSaved ? "" : `<button id="empty-reset">Clear filters</button>`}
    </div>`;
    if (!onSaved) el("empty-reset").addEventListener("click", resetFilters);
    return;
  }
  content.innerHTML = rows.map((j, i) => cardHTML(j, i)).join("");
  wireCards(content);
}

// Switch between the Openings and Saved tabs.
function setTab(tab){
  if (tab === TAB) return;
  TAB = tab;
  document.querySelectorAll("#tabs .tab").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  renderJobs();
  window.scrollTo({ top: 0, behavior: MOTION_OK ? "smooth" : "auto" });
}

// Score badge text: one decimal, but drop it for a clean "10".
function fmtScore(s){ const n = s ?? 0; return n >= 10 ? "10" : n.toFixed(1); }

const BD_LABELS = { eligibility:"Eligibility", field_relevance:"Field",
                    skill_match:"Skills", growth:"Growth" };

// Collapsible per-dimension breakdown behind a job's weighted score.
function breakdownHTML(b){
  if (!b || !b.dimensions) return "";
  const rows = Object.keys(BD_LABELS).filter(k => k in b.dimensions).map(k => {
    const v = +b.dimensions[k] || 0;
    const pct = Math.max(0, Math.min(100, v * 10));
    return `<div class="bd-row"><span class="bd-label">${BD_LABELS[k]}</span>`
      + `<span class="bd-track"><span class="bd-fill" style="width:${pct}%"></span></span>`
      + `<span class="bd-val">${v.toFixed(1)}</span></div>`;
  }).join("");
  const role = b.role_type
    ? `<span class="bd-role">${esc(String(b.role_type).replace(/_/g," "))}</span>` : "";
  const cap = b.capped ? `<span class="bd-cap">capped ${esc(String(b.cap))}</span>` : "";
  return `<details class="bd"><summary>Why this score ${role}${cap}</summary>`
    + `<div class="bd-body">${rows}</div></details>`;
}

function cardHTML(j, i = 0, pinned = false){
  const sCls = j.score >= 8 ? "s-hi" : (j.score >= 6 ? "s-mid" : "s-lo");
  const pct = Math.max(0, Math.min(100, (j.score ?? 0) * 10));
  const k = keyOf(j);
  const isApplied = applied.has(k);
  const isViewed = viewed.has(k);
  const isSaved = saved.has(k);
  const isHidden = hidden.has(k);
  const delay = Math.min(i, 12) * 0.04;  // cascade in, capped so it never drags
  const facts = [];
  if (j.timeframe) facts.push(`<span class="chip">🗓 ${esc(j.timeframe)}</span>`);
  if (j.pay) facts.push(`<span class="chip">💵 ${esc(j.pay)}</span>`);
  if (j.location) facts.push(`<span class="chip">📍 ${esc(j.location)}</span>`);
  const tags = (j.tags||[]).slice(0,6).map(t => `<span class="tag">${esc(t)}</span>`).join("");
  const isNew = j.first_seen && (Date.now() - new Date(j.first_seen).getTime() < TOP_WINDOW_MS);
  const newTag = isNew ? `<span class="new-tag" title="Posted in the last 24 hours">New</span>` : "";
  const badge = pinned
    ? `<span class="pin-badge">★ Top pick</span>`
      + `<span class="pin-dismiss" data-dismiss-id="${esc(k)}" role="button" tabindex="0" title="Dismiss from top picks">✕</span>`
    : (isViewed
      ? `<span class="viewed-badge" data-unview-id="${esc(k)}" title="Viewed — click to mark unviewed">👁 Viewed</span>` : "");
  // Editorial index in the grid (not on the pinned top-pick cards).
  const idx = pinned ? "" : `<span class="card-idx">${String(i + 1).padStart(2, "0")}</span>`;
  return `
  <div class="card reveal ${pinned?'pinned':''} ${isApplied?'applied':''} ${isViewed?'viewed':''}" style="--d:${delay}s">
    <div class="card-top">
      <div class="score ${sCls}" style="--p:0" data-p="${pct}"><span>${fmtScore(j.score)}</span></div>
      <div style="flex:1; min-width:0">
        <p class="title">${esc(j.title)}</p>
        <div class="company">${esc(j.company)} · <span class="src">${esc(j.source)}</span> · Posted ${fmtAge(j.posted_date || j.first_seen)}</div>
      </div>
      ${newTag}${badge}${idx}
    </div>
    ${j.summary ? `<div class="summary">${esc(j.summary)}</div>` : ""}
    ${facts.length ? `<div class="facts">${facts.join("")}</div>` : ""}
    ${tags ? `<div class="tags">${tags}</div>` : ""}
    ${breakdownHTML(j.breakdown)}
    <div class="actions">
      <a class="linkbtn" href="${esc(j.url)}" target="_blank" rel="noopener" data-view-id="${esc(k)}">Apply ↗</a>
      <div class="spacer"></div>
      <button class="iconmini save-btn ${isSaved?'is-saved':''}" data-act="save" data-id="${esc(k)}" aria-pressed="${isSaved}" title="${isSaved?'Saved — click to remove':'Save for later'}" aria-label="${isSaved?'Remove from saved':'Save for later'}">
        <svg viewBox="0 0 24 24" fill="${isSaved?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
      </button>
      <button class="secondary minibtn" data-act="apply" data-id="${esc(k)}">${isApplied?"✓ Applied":"Applied"}</button>
      <button class="secondary minibtn" data-act="hide" data-id="${esc(k)}">${isHidden?"Unhide":"Hide"}</button>
    </div>
  </div>`;
}

function onAction(e){
  const id = e.currentTarget.dataset.id, act = e.currentTarget.dataset.act;
  if (act === "apply") { applied.has(id)?applied.delete(id):applied.add(id); saveSet(LS.applied, applied); }
  if (act === "hide")  { hidden.has(id)?hidden.delete(id):hidden.add(id); saveSet(LS.hidden, hidden); }
  if (act === "save")  { saved.has(id)?saved.delete(id):saved.add(id); saveSet(LS.saved, saved); }
  renderJobs(); refreshMeta();
}

// Opening a job (the Apply link) marks it viewed. Don't preventDefault — the
// link still opens in a new tab; we just record that you've seen it.
function onView(e){
  const id = e.currentTarget.dataset.viewId;
  if (viewed.has(id)) return;
  viewed.add(id); saveSet(LS.viewed, viewed);
  e.currentTarget.closest(".card")?.classList.add("viewed");
  renderJobs(); refreshMeta();
}

function onUnview(e){
  e.preventDefault();
  const id = e.currentTarget.dataset.unviewId;
  viewed.delete(id); saveSet(LS.viewed, viewed);
  renderJobs(); refreshMeta();
}

// Dismiss a job from Top picks only (it stays in the grid below); the next-best
// opening from the last 24h cycles into its place. Dismissed ids age out of the
// rotation on their own once they fall outside the 24h window.
function onDismiss(e){
  const id = e.currentTarget.dataset.dismissId;
  topDismissed.add(id); saveSet(LS.topDismissed, topDismissed);
  renderJobs(); refreshMeta();
}

function refreshMeta(){
  const jobs = DATA.jobs || [];
  const activeJobs = jobs.filter(j => !hidden.has(keyOf(j)) && !applied.has(keyOf(j)));
  const newN = activeJobs.filter(j => !viewed.has(keyOf(j))).length;
  const appliedN = jobs.filter(j => applied.has(keyOf(j))).length;
  const savedN = jobs.filter(j => saved.has(keyOf(j))).length;
  // Tab counters (Openings = active openings, Saved = bookmarked).
  el("tab-openings").textContent = activeJobs.length;
  el("tab-saved").textContent = savedN;
  el("stats").innerHTML =
    `<span class="stat"><span class="pulse"></span><b>${activeJobs.length}</b> active</span>`
    + `<span class="stat"><b>${newN}</b> new</span>`
    + `<span class="stat"><b>${appliedN}</b> applied</span>`
    + `<span class="stat"><b>${jobs.length}</b> total</span>`;
  el("updated").textContent = `Updated ${fmtDate(DATA.generated_at)}`;
  // Count the numbers up once, on first paint (subsequent updates are instant).
  if (!_statsAnimated && MOTION_OK) {
    _statsAnimated = true;
    el("stats").querySelectorAll("b").forEach(b => countUp(b, +b.textContent));
  }
}
let _statsAnimated = false;
function countUp(node, target){
  const dur = 750, start = performance.now();
  node.textContent = "0";
  (function tick(now){
    const t = Math.min(1, (now - start) / dur);
    node.textContent = Math.round(target * (1 - Math.pow(1 - t, 3)));
    if (t < 1) requestAnimationFrame(tick);
  })(start);
}

// Mark the filter button as "active" when any filter differs from its default.
function refreshFilterState(){
  const dirty = el("q").value.trim() !== "" || el("source").value !== "" ||
                el("state").value !== "" ||
                el("view").value !== "active" || el("sort").value !== "date" ||
                el("minscore").value !== "7";
  el("filter-btn").classList.toggle("active", dirty);
}

// WMO weather code -> emoji + label (https://open-meteo.com docs).
function wxCode(c){
  const m = {
    0:["☀️","Clear sky"], 1:["🌤️","Mainly clear"], 2:["⛅","Partly cloudy"],
    3:["☁️","Overcast"], 45:["🌫️","Fog"], 48:["🌫️","Rime fog"],
    51:["🌦️","Light drizzle"], 53:["🌦️","Drizzle"], 55:["🌦️","Dense drizzle"],
    61:["🌧️","Light rain"], 63:["🌧️","Rain"], 65:["🌧️","Heavy rain"],
    66:["🌧️","Freezing rain"], 67:["🌧️","Freezing rain"],
    71:["🌨️","Light snow"], 73:["🌨️","Snow"], 75:["🌨️","Heavy snow"], 77:["🌨️","Snow grains"],
    80:["🌦️","Rain showers"], 81:["🌦️","Rain showers"], 82:["⛈️","Violent showers"],
    85:["🌨️","Snow showers"], 86:["🌨️","Snow showers"],
    95:["⛈️","Thunderstorm"], 96:["⛈️","Thunderstorm"], 99:["⛈️","Thunderstorm, hail"],
  };
  return m[c] || ["🌡️","Weather"];
}

// Live weather under the greeting, for two fixed locations side by side.
// Conditions from Open-Meteo (free, key-less). Fails silently (stays hidden)
// so the dashboard never depends on a third-party being up.
const WX_LOCATIONS = [
  { name:"Basking Ridge, NJ", lat:40.7065, lon:-74.5496 },
  { name:"Chicago, IL",       lat:41.8781, lon:-87.6298 },
];

async function fetchWx(loc){
  const u = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}`
    + `&current=temperature_2m,apparent_temperature,weather_code,precipitation`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max`
    + `&temperature_unit=fahrenheit&precipitation_unit=inch&timezone=auto&forecast_days=1`;
  return fetch(u).then(r => r.json());
}

function wxCardHTML(loc, w){
  const cur = w.current, day = w.daily || {};
  const [icon, label] = wxCode(cur.weather_code);
  const t = Math.round(cur.temperature_2m);
  const feels = Math.round(cur.apparent_temperature);
  const hi = day.temperature_2m_max ? Math.round(day.temperature_2m_max[0]) : null;
  const lo = day.temperature_2m_min ? Math.round(day.temperature_2m_min[0]) : null;
  const pop = day.precipitation_probability_max ? day.precipitation_probability_max[0] : null;
  const now = cur.precipitation;
  let precip = `💧 ${pop != null ? pop + "%" : "—"} chance`;
  if (now > 0) precip += ` · ${now}″ now`;
  return `<div class="wx-card">
    <div class="wx-city">${esc(loc.name)}</div>
    <div class="wx-main"><span class="wx-icon">${icon}</span><span class="wx-temp">${t}°</span></div>
    <div class="wx-cond">${label}</div>
    <div class="wx-stats">
      <span>Feels like ${feels}°</span>
      ${hi != null ? `<span>H ${hi}° · L ${lo}°</span>` : ""}
      <span>${precip}</span>
    </div>
  </div>`;
}

async function initWeather(){
  const box = el("weather");
  try {
    const results = await Promise.all(WX_LOCATIONS.map(async loc => {
      try { return [loc, await fetchWx(loc)]; } catch { return [loc, null]; }
    }));
    const cards = results
      .filter(([, w]) => w && w.current)
      .map(([loc, w]) => wxCardHTML(loc, w));
    if (!cards.length) return;
    box.innerHTML = cards.join("");
    box.classList.remove("hidden");
  } catch {
    box.classList.add("hidden");
  }
}

function openFilters(){ el("overlay").classList.remove("hidden"); }
function closeFilters(){ el("overlay").classList.add("hidden"); }

// Pull the freshly-deployed data without losing the session: re-fetch this page
// (cache-busted), extract the new encrypted payload, and re-decrypt with the
// password held in memory. Filters, applied/hidden state and scroll all persist.
async function refreshData(){
  const btn = el("refresh-btn");
  if (btn.classList.contains("loading") || !PW) return;
  btn.classList.add("loading");
  el("updated").textContent = "Refreshing…";
  try {
    const resp = await fetch(location.pathname + "?t=" + Date.now(), { cache:"no-store" });
    if (!resp.ok) throw new Error("fetch " + resp.status);
    const m = (await resp.text()).match(/const PAYLOAD = "([^"]*)"/);
    if (!m || !m[1]) throw new Error("payload not found");
    DATA = await decryptPayload(m[1], PW);
    renderJobs();
    refreshMeta();
  } catch (err) {
    el("updated").textContent = "Refresh failed — tap ↻ to retry";
  } finally {
    btn.classList.remove("loading");
  }
}

function resetFilters(){
  el("q").value = ""; el("source").value = ""; el("state").value = ""; el("view").value = "active";
  el("sort").value = "date"; el("minscore").value = "7";
  renderJobs(); refreshFilterState();
}

// Theme: persisted choice wins; otherwise follow the OS preference.
function applyTheme(t){
  if (t) document.documentElement.setAttribute("data-theme", t);
  else document.documentElement.removeAttribute("data-theme");
}
function currentTheme(){
  return document.documentElement.getAttribute("data-theme")
    || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
}
function toggleTheme(){
  const next = currentTheme() === "dark" ? "light" : "dark";
  applyTheme(next);
  try { localStorage.setItem("ja_theme", next); } catch {}
}
applyTheme(localStorage.getItem("ja_theme"));

const STATE_NAMES = {AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",
  CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",HI:"Hawaii",
  ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",
  ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",
  MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",
  NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",
  OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",
  TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",
  WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming",DC:"Washington, D.C.",Remote:"Remote"};

function initApp(){
  migrateKeys();  // carry legacy id-keyed state onto stable dedup keys (once)
  // populate source dropdown
  const sources = [...new Set((DATA.jobs||[]).map(j => j.source))].sort();
  el("source").insertAdjacentHTML("beforeend",
    sources.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join(""));
  // populate state dropdown from states actually present (full names, sorted)
  const states = [...new Set((DATA.jobs||[]).map(j => j.state).filter(Boolean))]
    .sort((a,b) => (STATE_NAMES[a]||a).localeCompare(STATE_NAMES[b]||b));
  el("state").insertAdjacentHTML("beforeend",
    states.map(s => `<option value="${esc(s)}">${esc(STATE_NAMES[s]||s)}</option>`).join(""));
  ["q","source","state","view","sort","minscore"].forEach(id =>
    el(id).addEventListener("input", () => { renderJobs(); refreshFilterState(); }));

  document.querySelectorAll("#tabs .tab").forEach(b =>
    b.addEventListener("click", () => setTab(b.dataset.tab)));
  el("filter-btn").addEventListener("click", openFilters);
  el("filter-done").addEventListener("click", closeFilters);
  el("overlay").addEventListener("click", e => { if (e.target === el("overlay")) closeFilters(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeFilters(); });
  el("filter-reset").addEventListener("click", resetFilters);
  el("theme-btn").addEventListener("click", toggleTheme);
  el("refresh-btn").addEventListener("click", refreshData);
  el("to-top").addEventListener("click", () =>
    window.scrollTo({ top: 0, behavior: MOTION_OK ? "smooth" : "auto" }));
  window.addEventListener("scroll", onScroll, { passive: true });

  refreshMeta();
  refreshFilterState();
  renderJobs();
  initWeather();
  onScroll();
}

// Drive the top scroll-progress bar and the back-to-top button visibility.
function onScroll(){
  const doc = document.documentElement;
  const max = doc.scrollHeight - doc.clientHeight;
  const pct = max > 0 ? (doc.scrollTop / max) * 100 : 0;
  el("scroll-progress").style.width = pct + "%";
  el("to-top").classList.toggle("show", doc.scrollTop > 500);
}

async function attemptUnlock(){
  const pw = el("pw").value;
  if (!pw) return;
  el("lock-err").textContent = "Decrypting…";
  try {
    DATA = await decryptPayload(PAYLOAD, pw);
    PW = pw;  // remember for refresh (in memory only, never stored)
    el("lock").classList.add("hidden");
    el("app").classList.remove("hidden");
    initApp();
  } catch (err) {
    el("lock-err").textContent = "Wrong password.";
  }
}
el("unlock-btn").addEventListener("click", attemptUnlock);
el("pw").addEventListener("keydown", e => { if (e.key === "Enter") attemptUnlock(); });
el("pw").focus();
</script>
</body>
